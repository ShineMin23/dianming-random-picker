<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 随机课堂点名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .input-section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .display-section {
            text-align: center;
            margin: 30px 0;
        }

        .result {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .result.rolling {
            animation: pulse 0.1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #999;
        }

        .history {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-title {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .history-item {
            display: inline-block;
            padding: 5px 12px;
            margin: 3px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: fall 3s ease-out forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 随机课堂点名</h1>

        <div class="input-section">
            <label for="names">学生名单</label>
            <textarea id="names" placeholder="输入学生姓名，每行一个或逗号分隔&#10;例如：&#10;张三&#10;李四&#10;王五">张茜玥
刘潇
张欣悦
王涵
陶晨
栗绍华
林琪
马玉佳
王浩然
张硕颀
习雨阳
胡俣
李傲男
姜鸣岐
刘子怡
张涛
张羽瑶
李紫薇
陈宣羽
刘越
唐艺菡
张清
包力丹
关雅丹
曹然
周嘉慧
杨博语
童佳
黎苏瑶
周洁
贺亚雯
朱冠臣
潘潞娜</textarea>
            <p class="hint">提示：支持换行或逗号、空格分隔姓名</p>
        </div>

        <div class="display-section">
            <div class="result" id="result">???</div>
            <button class="btn" id="startBtn" type="button">🎯 开始点名</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总人数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pickCount">0</div>
                <div class="stat-label">已点名</div>
            </div>
        </div>

        <div class="history" id="historySection" style="display: none;">
            <div class="history-title">📋 点名记录</div>
            <div id="historyList"></div>
        </div>
    </div>

    <div class="confetti" id="confetti"></div>

    <script>
        let isRolling = false;
        let history = [];
        let rollTimer = null;

        // 初始化人数统计
        updateTotalCount();
        document.getElementById('names').addEventListener('input', updateTotalCount);
        document.getElementById('startBtn').addEventListener('click', startPick);

        function parseNames() {
            const input = document.getElementById('names').value;
            return input.split(/[\n,，\s]+/).filter(name => name.trim() !== '');
        }

        function updateTotalCount() {
            const names = parseNames();
            document.getElementById('totalCount').textContent = names.length;
        }

        function startPick() {
            if (isRolling) return;

            const names = parseNames();
            if (names.length === 0) {
                alert('请先输入学生名单！');
                return;
            }

            const resultEl = document.getElementById('result');
            const btn = document.getElementById('startBtn');

            isRolling = true;
            btn.disabled = true;
            btn.textContent = '🎲 滚动中...';
            resultEl.classList.add('rolling');

            // 滚动动画
            let speed = 50;
            let count = 0;
            const maxCount = Math.floor(30 + Math.random() * 10);

            function rollOnce() {
                const randomName = names[Math.floor(Math.random() * names.length)];
                resultEl.textContent = randomName;
                count++;

                // 逐渐减速
                if (count > maxCount * 0.7) speed = 100;
                if (count > maxCount * 0.9) speed = 200;

                if (count >= maxCount) {
                    rollTimer = null;
                    finishPick(randomName);
                    return;
                }

                rollTimer = setTimeout(rollOnce, speed);
            }

            rollOnce();
        }

        function finishPick(winner) {
            const resultEl = document.getElementById('result');
            const btn = document.getElementById('startBtn');

            resultEl.classList.remove('rolling');
            resultEl.style.transform = 'scale(1.2)';
            setTimeout(() => {
                resultEl.style.transform = 'scale(1)';
            }, 300);

            // 添加到历史记录
            history.push(winner);
            updateHistory();

            // 更新统计
            document.getElementById('pickCount').textContent = history.length;

            // 彩带效果
            createConfetti();

            // 恢复按钮
            isRolling = false;
            btn.disabled = false;
            btn.textContent = '🎯 再次点名';
        }

        function updateHistory() {
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');

            if (history.length > 0) {
                section.style.display = 'block';
                list.innerHTML = history.map((name, index) =>
                    `<span class="history-item">${index + 1}. ${name}</span>`
                ).join('');

                // 自动滚动到底部
                list.scrollTop = list.scrollHeight;
            }
        }

        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe'];
            const container = document.getElementById('confetti');

            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 0.5 + 's';
                piece.style.animationDuration = (2 + Math.random() * 2) + 's';

                // 随机形状
                const shapes = ['50%', '0%', '50% 0 50% 50%'];
                piece.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];

                container.appendChild(piece);

                // 清理
                setTimeout(() => piece.remove(), 4000);
            }
        }

        window.startPick = startPick;
    </script>
</body>
</html>
